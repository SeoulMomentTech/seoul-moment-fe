name = "commit-helper"
description = "SKILL.md 규칙 기반 Conventional Commits 생성 및 자동 커밋 실행기"

prompt = """
제공된 'SKILL.md' 파일의 지침에 따라 Git 변경 사항을 분석하고 커밋 메시지를 작성한 뒤, 커밋을 실행하세요.

[핵심 지침]
1. SKILL.md의 '수행 절차'를 엄격히 준수할 것.
2. 현재 브랜치가 'develop'인 경우, 반드시 작업 내용에 맞는 새 브랜치를 생성하고 이동(`git checkout -b <branch>`)한 후 커밋을 진행할 것.
3. 커밋 메시지는 반드시 영문으로 작성하고, 작성된 메시지로 실제 커밋(`git commit -m "..."`)을 실행하여 반영할 것.
4. 결과물 외의 불필요한 대화나 설명은 생략할 것.

[참조 파일]
{{skills/commit-helper/SKILL.md}}
"""

[settings]
model = "gemini-1.5-pro"
temperature = 0.2